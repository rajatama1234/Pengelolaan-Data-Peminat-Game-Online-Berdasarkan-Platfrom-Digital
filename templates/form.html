{% extends 'layout.html' %}
{% block content %}
  <div class="form-header">
    <h2>{{ '✏️' if action == 'Edit' else '➕' }} {{ action }} Game</h2>
    <a href="/" class="btn-secondary">← Kembali</a>
  </div>

  <div class="form-container">
    <form method="post" class="form-group">
      <div class="form-field">
        <label for="name">Nama Game *</label>
        <input id="name" name="name" type="text" value="{{ game.name if game else '' }}" required placeholder="Masukkan nama game">
      </div>

      <div class="form-field">
        <label for="platform">Platform *</label>
        <select id="platform" name="platform" required>
          <option value="">-- Pilih Platform --</option>
          <option value="Play Store" {% if game and game.platform == 'Play Store' %}selected{% endif %}>📱 Play Store</option>
          <option value="PC" {% if game and game.platform == 'PC' %}selected{% endif %}>🖥️ PC</option>
          <option value="Console" {% if game and game.platform == 'Console' %}selected{% endif %}>🎮 Console</option>
          <option value="Steam" {% if game and game.platform == 'Steam' %}selected{% endif %}>🎯 Steam</option>
          <option value="Epic Games" {% if game and game.platform == 'Epic Games' %}selected{% endif %}>⚡ Epic Games</option>
          <option value="App Store" {% if game and game.platform == 'App Store' %}selected{% endif %}>🍎 App Store</option>
          <option value="Microsoft Store" {% if game and game.platform == 'Microsoft Store' %}selected{% endif %}>💻 Microsoft Store</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="peminat_ribu">Jumlah Peminat (ribu)</label>
          <input id="peminat_ribu" name="peminat_ribu" type="number" value="{{ game.peminat_ribu if game else 0 }}" min="0" placeholder="0">
        </div>

        <div class="form-field">
          <label for="rating">Rating (0-5)</label>
          <input id="rating" name="rating" type="number" step="0.1" min="0" max="5" value="{{ game.rating if game else 0 }}" placeholder="0.0">
        </div>
      </div>

      <div class="form-field">
        <label for="genre">Genre</label>
        <input id="genre" name="genre" type="text" value="{{ game.genre if game else '' }}" placeholder="e.g., RPG, FPS, Adventure">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">{{ '💾 ' + action }}</button>
        <a href="/" class="btn-cancel">Batal</a>
      </div>
    </form>
  </div>
{% endblock %}
